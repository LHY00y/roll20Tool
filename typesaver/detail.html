<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeSaver - Detail</title>
    <link rel="stylesheet" href="detail.css">
</head>

<body>
    <div class="detail">
        <div class="detail__header">
            <button class="detail__back" id="btnBack" title="뒤로">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <span class="detail__heading" id="pageTitle">상용구 추가</span>
            <button class="detail__delete hidden" id="btnDelete" title="삭제">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6" />
                    <path d="M14 11v6" />
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg>
            </button>
        </div>

        <div class="detail__form">
            <label class="form-label" for="inputTitle">제목</label>
            <input type="text" class="form-input" id="inputTitle" placeholder="제목을 입력하세요">

            <label class="form-label" for="inputTag">태그 <span class="form-hint">쉼표(,)로 구분</span></label>
            <div class="tag-input-wrap" id="tagInputWrap">
                <div class="tag-chips" id="tagChips"></div>
                <input type="text" class="tag-input" id="inputTag" placeholder="태그 입력 후 쉼표 또는 Enter">
            </div>

            <label class="form-label" for="inputContent">내용 <span class="form-hint">${파라미터명} 으로 변수 삽입</span></label>
            <textarea class="form-textarea" id="inputContent" placeholder="내용을 입력하세요&#10;예: ${이름}님 안녕하세요."
                rows="6"></textarea>

            <div class="params-section hidden" id="paramsSection">
                <label class="form-label">파라미터</label>
                <div class="params-list" id="paramsList"></div>
            </div>

            <div class="preview-section">
                <div class="preview-header">
                    <label class="form-label">미리보기</label>
                    <button class="btn-copy" id="btnCopyPreview" title="복사">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                    </button>
                </div>
                <div class="preview-box" id="previewBox">내용을 입력하면 미리보기가 표시됩니다.</div>
            </div>
        </div>

        <div class="detail__footer">
            <button class="btn btn--save" id="btnSave">저장</button>
        </div>
    </div>

    <script src="../theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="typeSaver.js"></script>
    <script src="detailUI.js"></script>
</body>

</html>
<script>
    window.addEventListener(`dragover`, (evt = event) => {
        evt.preventDefault();
        evt.dataTransfer.effectAllowed = `none`;
        evt.dataTransfer.dropEffect = `none`;
    }, false);

    window.addEventListener(`drop`, (evt = event) => {
        evt.preventDefault();
        evt.dataTransfer.effectAllowed = `none`;
        evt.dataTransfer.dropEffect = `none`;
    }, false)
</script>
