<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Detail</title>
  <link rel="stylesheet" href="detail.css">
</head>

<body>
  <div class="bm-detail">
    <!-- 헤더 -->
    <div class="bm-detail__header">
      <button class="bm-detail__back" id="btnBack" title="뒤로">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
      <span class="bm-detail__header-title" id="headerTitle">북마크 추가</span>
      <button class="bm-detail__delete" id="btnDelete" style="display:none;" title="삭제">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
        </svg>
      </button>
    </div>

    <!-- 폼 -->
    <div class="bm-detail__body">
      <label class="bm-detail__label">제목</label>
      <input type="text" class="bm-detail__input" id="inputTitle" placeholder="북마크 이름">

      <label class="bm-detail__label">URL</label>
      <input type="text" class="bm-detail__input" id="inputUrl" placeholder="https://...">

      <label class="bm-detail__label">태그</label>
      <div class="tag-input-wrap" id="tagInputWrap">
        <div class="tag-chips" id="tagChips"></div>
        <input type="text" class="tag-input" id="tagInput" placeholder="태그 입력 후 , 또는 Enter">
      </div>

      <label class="bm-detail__label">메모</label>
      <textarea class="bm-detail__textarea" id="inputMemo" rows="4" placeholder="메모"></textarea>
    </div>

    <!-- 푸터 -->
    <div class="bm-detail__footer">
      <button class="bm-detail__save" id="btnSave">저장</button>
    </div>
  </div>

  <script src="../theme.js"></script>
  <script src="bookmarkData.js"></script>
  <script src="detailUI.js"></script>
</body>

</html>
<script>
  window.addEventListener(`dragover`, (evt = event) => {
    evt.preventDefault();
    evt.dataTransfer.effectAllowed = `none`;
    evt.dataTransfer.dropEffect = `none`;
  }, false);

  window.addEventListener(`drop`, (evt = event) => {
    evt.preventDefault();
    evt.dataTransfer.effectAllowed = `none`;
    evt.dataTransfer.dropEffect = `none`;
  }, false)
</script>
