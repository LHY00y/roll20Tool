<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeSaver</title>
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
  <div id="app">

    <main class="content">
      <section class="page active" id="page1">
        <iframe src="typeSaver/index.html" class="page-frame" id="typeSaverFrame"></iframe>
      </section>
      <section class="page" id="page2">
        <iframe src="macroStorage/index.html" class="page-frame" id="macroStorageFrame"></iframe>
      </section>
      <section class="page" id="page3">
        <iframe src="calendar/index.html" class="page-frame" id="calendarFrame"></iframe>
      </section>
      <section class="page" id="page4">
        <iframe src="bookmark/index.html" class="page-frame" id="bookmarkFrame"></iframe>
      </section>
      <section class="page" id="page5">
        <iframe src="memo/index.html" class="page-frame" id="memoFrame"></iframe>
      </section>
    </main>
    <header class="header">
      <nav class="header__nav">

      </nav>
      <!-- 탭 가시성 설정 메뉴 -->
      <div class="tab-settings" id="tabSettings" style="display:none;">
        <!-- 테마 설정 -->
        <div class="theme-settings">
          <button class="theme-settings__btn" id="btnThemeModal" data-i18n="theme_settings_btn">🎨 테마 설정</button>
          <button class="theme-settings__btn display-none" id="btnLang" data-i18n="lang_btn">EN</button>
        </div>
        <div class="theme-settings__divider"></div>
        <div class="tab-settings__item" data-page="page1" data-visible="true" draggable="true">
          <span class="tab-settings__handle">☰</span>
          <span class="tab-settings__name" data-i18n="tab_clipboard">클립보드</span>
          <svg class="eye-icon eye-open" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <svg class="eye-icon eye-closed" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />

          <span class="tab-settings__handle">☰</span>
          <span class="tab-settings__name" data-i18n="tab_macro">매크로 저장소</span>
          <svg class="eye-icon eye-open" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />

              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />

        </div>
        <div class="tab-settings__item" data-page="page3" data-visible="true" draggable="true">

          <span class="tab-settings__name" data-i18n="tab_calendar">일정</span>

            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <circle cx="12" cy="12" r="3" />
          </svg>

            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
        </div>
        <div class="tab-settings__item" data-page="page4" data-visible="true" draggable="true">
          <span class="tab-settings__handle">☰</span>
          <span class="tab-settings__name" data-i18n="tab_bookmark">북마크</span>

            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />

        </div>
        <div class="tab-settings__item" data-page="page5" data-visible="true" draggable="true">
          <span class="tab-settings__handle">☰</span>
          <span class="tab-settings__name" data-i18n="tab_memo">메모</span>
          <svg class="eye-icon eye-open" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </div>

      </div>
    </header>
  </div>
  <!-- 테마 설정 모달 -->
  <div class="theme-modal-overlay" id="themeModalOverlay" style="display:none;">
    <div class="theme-modal" id="themeModal">
      <div class="theme-modal__header">
        <span class="theme-modal__title" data-i18n="theme_modal_title">테마 설정</span>
        <button class="theme-modal__close" id="themeModalClose">×</button>
      </div>
      <div class="theme-modal__body">
        <div class="theme-modal__row">
          <label class="theme-modal__label" data-i18n="theme_text_color">글씨색</label>
          <input type="color" id="themeText" class="theme-modal__color">
        </div>
        <div class="theme-modal__row">
          <label class="theme-modal__label" data-i18n="theme_bg_color">배경색</label>
          <input type="color" id="themeBg" class="theme-modal__color">
        </div>
        <div class="theme-modal__row">
          <label class="theme-modal__label" data-i18n="theme_primary_color">포인트색</label>
          <input type="color" id="themePrimary" class="theme-modal__color">
        </div>
        <div class="theme-modal__row">
          <label class="theme-modal__label" data-i18n="theme_primary_text_color">포인트 글씨색</label>
          <input type="color" id="themePrimaryText" class="theme-modal__color">
        </div>
        <div class="theme-modal__row">
          <span class="theme-modal__hint" data-i18n="theme_hint">*사이드바에서 스포이드 기능은 작동하지 않습니다.</span>
        </div>
      </div>
      <div class="theme-modal__footer">
        <button class="theme-modal__reset" id="themeReset" data-i18n="reset">초기화</button>
      </div>
    </div>
  </div>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/nodrop.js"></script>
</body>

</html>
